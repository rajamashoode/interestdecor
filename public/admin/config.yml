backend:
  name: github
  repo: rajamashoode/interestdecor
  branch: main

media_folder: public/images/uploads
public_folder: /images/uploads

site_url: https://interestdecor.com
display_url: https://interestdecor.com

collections:
  - name: blog
    label: Blog Posts
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description (SEO)", name: "description", widget: "string" }
      - { label: "Excerpt (card summary)", name: "excerpt", widget: "text" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Home Decor", value: "Home Decor" }
          - { label: "Kitchen Gardening", value: "Kitchen Gardening" }
          - { label: "Floral Arrangements", value: "Floral Arrangements" }
          - { label: "DIY & Crafts", value: "DIY & Crafts" }
      - label: "Category Slug"
        name: "categorySlug"
        widget: "select"
        options:
          - { label: "Home Decor", value: "home-decor" }
          - { label: "Kitchen Gardening", value: "kitchen-gardening" }
          - { label: "Floral Arrangements", value: "floral-arrangements" }
          - { label: "DIY & Crafts", value: "diy-crafts" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Display Date (e.g. Jun 3, 2026)", name: "displayDate", widget: "string" }
      - { label: "Read Time (e.g. 8 min read)", name: "readTime", widget: "string" }
      - { label: "Hero Image", name: "heroImage", widget: "image" }
      - { label: "Hero Image Alt Text", name: "heroAlt", widget: "string" }
      - { label: "Author", name: "author", widget: "string", default: "Mashood Elahi" }
      - { label: "Keywords (comma-separated)", name: "keywords", widget: "string", required: false }
      - label: "Table of Contents"
        name: "toc"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Anchor (e.g. #section-1)", name: "href", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
